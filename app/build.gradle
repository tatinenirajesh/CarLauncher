plugins {
    id 'com.android.application'
}

android {
    namespace 'com.kidscar.launcher'
    compileSdk 34

    defaultConfig {
        applicationId "com.kidscar.launcher"
        minSdk 26
        targetSdk 34
        versionCode 3
        versionName "3.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // No Car App Library needed — we use plain Activity + CAR_LAUNCHER
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.webkit:webkit:1.10.0'
}
